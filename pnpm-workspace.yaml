packages:
  - 'packages/*'
  - 'test-app'
  - 'docs-app'

####################
# super strict mode
####################
autoInstallPeers: false
strictPeerDependents: true
resolvePeersFromWorkspaceRoot: false

################
# Optimizations
################
# Less strict, but required for tooling to not barf on duplicate peer trees.
# (many libraries declare the same peers, which resolve to the same
#  versions)
peersSuffixMaxLength: 40
dedupeInjectedDeps: true
dedupePeerDependents: true
publicHoistPattern:
  - ember-source
syncInjectedDepsAfterScripts:
  - build
  - sync
injectWorkspacePackages: true

################
# Compatibility
################
# highest is what everyone is used to, but
# not ensuring folks are actually compatible with declared ranges.
resolutionMode: highest

# pnpm 11 re-checks (and re-runs) install before every `pnpm run`.
# With injected workspace deps + dedupeInjectedDeps the regenerated
# lockfile trips a false-positive ERR_PNPM_OUTDATED_LOCKFILE in CI
# (e.g. the floating-deps job), so run scripts against what's installed.
verifyDepsBeforeRun: false

# Force browserslist-generator v3+ so that rollup-plugin-ts loads under Node 24.
# v2.x uses the removed `assert { type: 'json' }` import assertion syntax;
# v3.x uses the standard `with { type: 'json' }` import attribute syntax.
overrides:
  browserslist-generator: ^3.0.0

peerDependencyRules:
  ignoreMissing:
    - ember-cli-htmlbars
    - '@babel/core'
    # Old glint envs are still declared as peers by some transitive deps
    # (e.g. @crowdstrike/ember-oss-docs); the new glint setup no longer
    # ships them, so ignore.
    - '@glint/environment-ember-loose'
  allowedVersions:
    # Some transitive deps (e.g. rollup-plugin-ts) do not declare TS 6 support
    # yet, but they work fine.
    typescript: '6'

allowBuilds:
  core-js: false
  unrs-resolver: true
