name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TURBO_API: http://127.0.0.1:9080
  TURBO_TOKEN: foo-123
  TURBO_TEAM: foo

jobs:
  install_dependencies:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - name: Lint + Format + Glint
        run: pnpm lint

  typecheck:
    name: '${{ matrix.typescript-scenario }}'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - install_dependencies
    continue-on-error: true
    strategy:
      fail-fast: true
      matrix:
        typescript-scenario:
          - typescript@6.0

    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - name: 'Change TS to ${{ matrix.typescript-scenario }}'
        run: 'pnpm add --save-dev ${{ matrix.typescript-scenario}}'
        working-directory: ./test-app
      - name: 'Type checking'
        # --force: a turbo cache replay restores the workspace packages' dist
        # but skips the actual `pnpm run build`, so pnpm's
        # syncInjectedDepsAfterScripts hook never refreshes the injected
        # copies created by the preceding install
        run: pnpm turbo typecheck --force

  default_tests:
    name: Default Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - run: pnpm test
      # For the Try Scenarios
      - id: set-matrix
        working-directory: ./test-app
        run: echo "matrix=$(pnpm -s dlx @embroider/try list)" >> $GITHUB_OUTPUT

  floating_tests:
    name: Floating Deps Test
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - name: Install Dependencies (without lockfile)
        run: rm pnpm-lock.yaml && pnpm install
      - run: pnpm test

  try_scenarios:
    name: ${{ matrix.name }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [default_tests]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.default_tests.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply Scenario
        working-directory: ./test-app
        run: pnpm dlx @embroider/try apply ${{ matrix.name }}
      - name: Install Dependencies (scenario overrides, no lockfile)
        run: pnpm install --no-lockfile
      - name: Run Tests
        working-directory: ./test-app
        # --force: a turbo cache replay restores the workspace packages' dist
        # but skips the actual `pnpm run build`, so pnpm's
        # syncInjectedDepsAfterScripts hook never refreshes the injected
        # copies created by the scenario install
        run: pnpm turbo test --force
        env: ${{ matrix.env }}

  publishDocs:
    name: Publish Docs to Cloudflare Pages
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.UX_OSS_CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/pnpm
      - run: pnpm build:docs
      - name: Publish to Cloudflare Pages
        id: publishStep
        # skip (rather than fail) when the Cloudflare secrets are not
        # configured, e.g. on forks or PRs from forks
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.UX_OSS_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.UX_OSS_CLOUDFLARE_ACCOUNT_ID }}
          projectName: ember-headless-form
          directory: ./docs-app/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: marocchino/sticky-pull-request-comment@v2
        if: env.CLOUDFLARE_API_TOKEN != '' && github.event_name == 'pull_request'
        with:
          message: |+
            ## Preview URLs
            Env: ${{ steps.publishStep.outputs.environment }}
            Docs: ${{ steps.publishStep.outputs.url }}
#            # api docs: ${{ steps.publishStep.outputs.url }}/api/modules.html