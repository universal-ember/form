name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TURBO_API: http://127.0.0.1:9080
  TURBO_TOKEN: foo-123
  TURBO_TEAM: foo

jobs:
  install_dependencies:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - name: Lint + Format + Glint
        run: pnpm lint

  typecheck:
    name: '${{ matrix.typescript-scenario }}'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - install_dependencies
    continue-on-error: true
    strategy:
      fail-fast: true
      matrix:
        typescript-scenario:
          - typescript@6.0

    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - name: 'Change TS to ${{ matrix.typescript-scenario }}'
        run: 'pnpm add --save-dev ${{ matrix.typescript-scenario}}'
        working-directory: ./test-app
      - name: 'Type checking'
        run: pnpm turbo typecheck

  default_tests:
    name: Default Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - run: pnpm test
      # For the Try Scenarios
      - id: set-matrix
        working-directory: ./test-app
        run: echo "matrix=$(pnpm -s dlx @embroider/try list)" >> $GITHUB_OUTPUT

  floating_tests:
    name: Floating Deps Test
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs:
      - install_dependencies
    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - name: Install Dependencies (without lockfile)
        run: rm pnpm-lock.yaml && pnpm install
      # the fresh install re-created the injected workspace-package copies;
      # --force makes the package builds really run so pnpm re-syncs them
      - run: pnpm test --force

  try_scenarios:
    name: ${{ matrix.name }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [default_tests]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.default_tests.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply Scenario
        working-directory: ./test-app
        run: pnpm dlx @embroider/try apply ${{ matrix.name }}
      - name: Install Dependencies (scenario overrides, no lockfile)
        run: pnpm install --no-lockfile
      - name: Run Tests
        working-directory: ./test-app
        # --force: a turbo cache replay restores the workspace packages' dist
        # but skips the actual `pnpm run build`, so pnpm's
        # syncInjectedDepsAfterScripts hook never refreshes the injected
        # copies created by the scenario install
        # scenarios only vary test-app's dependencies; docs-app tests run
        # in the Default Tests job
        run: pnpm turbo test --filter test-app --force
        env: ${{ matrix.env }}

  build_docs:
    name: 'Build: Docs'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - install_dependencies
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: TurboRepo local server
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pnpm
      - run: pnpm build:docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs-app-dist
          if-no-files-found: error
          path: |
            ./docs-app/dist/**/*
            !node_modules/
            !./**/node_modules/

  deploy_docs:
    name: 'Deploy: Production'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build_docs]
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-app-dist
          path: docs-app-dist
      - name: Publish
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./docs-app-dist/ --project-name=ue-form
